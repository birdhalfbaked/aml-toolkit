# Builds the Wails desktop app on push to main, PRs, version tags, and manual runs — not release-only.
# Targets: Windows x64, macOS (Intel + Apple Silicon via darwin/universal), Linux x64 + arm64.
name: Desktop build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  wails:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: aml-toolkit-windows-amd64
            wails_extra: ""
          - os: windows-latest
            platform: windows/arm64
            artifact: aml-toolkit-windows-arm64
            wails_extra: ""
          - os: macos-latest
            platform: darwin/universal
            artifact: aml-toolkit-macos-universal
            wails_extra: ""
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: aml-toolkit-linux-amd64
            wails_extra: "-tags webkit2_41"
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: aml-toolkit-linux-arm64
            wails_extra: "-tags webkit2_41"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # WebKit/GTK: Wails. libasound2-dev: pkg-config "alsa" for gopxl/beep → ebitengine/oto (CGO).
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libasound2-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build frontend assets
        working-directory: frontend
        shell: bash
        run: yarn && yarn build

      - name: Build desktop app
        working-directory: backend/cmd/wails
        shell: bash
        run: wails build -clean -platform ${{ matrix.platform }} ${{ matrix.wails_extra }}

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: audio-tagger-desktop-${{ matrix.artifact }}
          path: backend/cmd/wails/build/bin/*
          if-no-files-found: error

  # One zip containing every platform folder (artifact downloads are unpacked; this re-archives them together).
  bundle-all:
    name: All platforms (single zip)
    needs: wails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: platforms
          pattern: audio-tagger-desktop-*
          merge-multiple: false

      - name: Create combined archive
        shell: bash
        run: |
          set -euo pipefail
          out="audio-tagger-desktop-all-${{ github.run_id }}.zip"
          (cd platforms && zip -r9 "$GITHUB_WORKSPACE/$out" .)
          echo "BUNDLE_NAME=$out" >> "$GITHUB_ENV"
          ls -la "$GITHUB_WORKSPACE/$out"

      - name: Upload combined zip
        uses: actions/upload-artifact@v7
        with:
          name: audio-tagger-desktop-all-platforms
          path: ${{ env.BUNDLE_NAME }}
          if-no-files-found: error
